<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checkout · S26X CODEX SHOP</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app-shell">

  <header class="app-header">
    <div class="brand">S26X<br /><small>CODEX SHOP</small></div>
    <div class="header-actions">
      <a href="wallet.html" class="wallet-pill" id="walletPill">৳0</a>
      <a href="account.html" class="avatar">A</a>
    </div>
  </header>

  <div class="section-title"><h2>Payment</h2></div>
  <div class="pay-tabs">
    <div class="pay-tab active" id="tabWallet" onclick="selectTab('wallet')">💼 Wallet</div>
    <div class="pay-tab" id="tabOnline" onclick="selectTab('online')">🌐 Online</div>
  </div>

  <div class="summary-box" id="summaryBox">Loading…</div>

  <button class="btn-primary" id="buyBtn">Buy now</button>
  <div id="buyResult" style="padding:0 18px; font-weight:600;"></div>

  <nav class="bottom-nav">
    <a href="index.html">🏠<span>Home</span></a>
    <a href="topup.html">📶<span>Topup</span></a>
    <a href="orders.html">🧾<span>Orders</span></a>
    <a href="account.html">👤<span>Account</span></a>
  </nav>
</div>

<script>window.S26X_API_BASE_URL = "";</script>
<script src="js/api.js"></script>
<script>
  const productId = qs("product");
  const packageId = qs("package");
  const playerUid = qs("uid") || "";
  let payMethod = "wallet";
  let balance = 0;
  let pkg = null;

  function selectTab(tab) {
    payMethod = tab;
    document.getElementById("tabWallet").classList.toggle("active", tab === "wallet");
    document.getElementById("tabOnline").classList.toggle("active", tab === "online");
    if (tab === "online") {
      window.location.href = `wallet.html?redirect=checkout.html&product=${productId}&package=${packageId}&uid=${encodeURIComponent(playerUid)}`;
    }
  }

  async function load() {
    const product = await Api.getProduct(productId);
    pkg = product.packages.find(p => p.id === packageId);
    const bal = await Api.getBalance((await getCurrentUserId()));
    balance = bal.wallet_balance;
    document.getElementById("walletPill").textContent = bdt(balance);

    document.getElementById("summaryBox").innerHTML = `
      <div class="summary-row"><span>${product.name}</span><span>${pkg.label}</span></div>
      <div class="summary-row"><span>Player UID</span><span>${playerUid || "-"}</span></div>
      <div class="summary-row"><span>Current balance</span><span>${bdt(balance)}</span></div>
      <div class="summary-total"><span>Total payable</span><span class="amount">${bdt(pkg.price_bdt)}</span></div>
    `;

    document.getElementById("buyBtn").disabled = balance < pkg.price_bdt;
    if (balance < pkg.price_bdt) {
      document.getElementById("buyResult").innerHTML =
        `Not enough balance. <a href="wallet.html" style="color:var(--primary-dark);">Add funds</a>`;
    }
  }

  document.getElementById("buyBtn").addEventListener("click", async () => {
    const btn = document.getElementById("buyBtn");
    btn.disabled = true; btn.textContent = "Placing order…";
    try {
      const order = await Api.createOrder((await getCurrentUserId()), productId, packageId, playerUid);
      window.location.href = `orders.html?justPlaced=${order.id}`;
    } catch (err) {
      document.getElementById("buyResult").textContent = err.message;
      document.getElementById("buyResult").style.color = "var(--danger)";
      btn.disabled = false; btn.textContent = "Buy now";
    }
  });

  load();
</script>
</body>
</html>
