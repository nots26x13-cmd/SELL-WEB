<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Login · S26X CODEX SHOP</title>
<link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <div class="login-card">
    <div class="brand" style="margin-bottom:18px;">S26X<br /><small>CODEX SHOP ADMIN</small></div>
    <div class="form-row">
      <label>Email</label>
      <input id="email" type="email" placeholder="admin@example.com" />
    </div>
    <div class="form-row">
      <label>Password</label>
      <input id="password" type="password" placeholder="••••••••" />
    </div>
    <button class="btn-primary" style="width:100%; margin:0;" id="loginBtn">Log in</button>
    <div id="loginError" style="color:var(--danger); font-weight:600; margin-top:10px;"></div>
  </div>

<script>window.S26X_API_BASE_URL = "";</script>
<script src="../js/api.js"></script>
<script>
  document.getElementById("loginBtn").addEventListener("click", async () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    try {
      await apiFetch("/api/admin/login", { method: "POST", body: JSON.stringify({ email, password }) });
      window.location.href = "index.html";
    } catch (err) {
      document.getElementById("loginError").textContent = err.message;
    }
  });
</script>
</body>
</html>
